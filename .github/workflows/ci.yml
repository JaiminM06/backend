name: CI

on:
  push:
    branches: [main, develop, master]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: backend

      - name: Run linter
        run: npm run lint
        working-directory: backend

      - name: Run tests
        run: npm test
        working-directory: backend
        env:
          NODE_ENV: test
          # Add MONGODB_URI_TEST to GitHub repo secrets before enabling DB tests
          MONGODB_URI: ${{ secrets.MONGODB_URI_TEST }}
          ACCESS_TOKEN_SECRET: test_access_token_secret_for_ci
          REFRESH_TOKEN_SECRET: test_refresh_token_secret_for_ci
          ACCESS_TOKEN_EXPIRY: 1d
          REFRESH_TOKEN_EXPIRY: 10d
          REDIS_URL: redis://localhost:6379
          NODE_OPTIONS: --experimental-vm-modules

  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t mediaverse-api backend/

      - name: Verify image starts
        run: |
          docker run -d --name test-container \
            -e NODE_ENV=test \
            -e MONGODB_URI=mongodb://localhost:27017/test \
            -e ACCESS_TOKEN_SECRET=test_access_token_secret_for_ci \
            -e REFRESH_TOKEN_SECRET=test_refresh_token_secret_for_ci \
            -e ACCESS_TOKEN_EXPIRY=1d \
            -e REFRESH_TOKEN_EXPIRY=10d \
            -e PORT=8000 \
            -e REDIS_URL=redis://localhost:6379 \
            -p 8000:8000 \
            mediaverse-api
          timeout 30 bash -c 'until curl -sf http://localhost:8000/api/v1/healthcheck || curl -sf http://localhost:8000/health || curl -sf http://localhost:8000/; do sleep 2; done'
          echo "Server is healthy"
          docker logs test-container
          docker stop test-container
